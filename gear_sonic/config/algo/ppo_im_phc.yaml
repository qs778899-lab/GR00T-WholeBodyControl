# @package _global_

defaults:
  - trl@algo.trl: ppo
  - /actor_critic: mlp

algo:
  _recursive_: False
  config:
    num_learning_epochs: 5
    num_mini_batches: 4
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
    value_loss_coef: 1.0
    entropy_coef: 0.01
    actor_learning_rate: 2e-5  # 5e-4 # 1.e-3
    critic_learning_rate: 1.e-3 # 5e-4 # 1.e-3
    max_grad_norm: 1.0
    use_clipped_value_loss: True
    schedule: "adaptive"
    desired_kl: 0.01
    adaptive_lr_min: 1e-5
    adaptive_lr_max: 2e-4

    use_new_actor_critic: True
    use_padding_mask: False
    ppo_shuffle_every_epoch: True
    sync_advantage_normalization: True
    empty_cache_every_n_ppo_epoch: 3

    num_steps_per_env: 32
    save_interval: 500
    eval_frequency: 500
    load_optimizer: True

    init_noise_std: 0.05

    num_learning_iterations: 100000
    init_at_random_ep_len: True

    global_rank: 0
    world_size: 1
